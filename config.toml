# 表示这是一个输入节点
[input.service]
# 输入节点将打开一个指定的端口
port = 9000
# 输入节点的后继是模型节点，根据协议中的 `model` 字段路由到指定名字的后继
models = ["qwen3.5-35b-a3b", "qwen3.5-122b-a10b"]

# 这是一个虚节点
[node."qwen3.5-35b-a3b"]
# 虚节点路由策略是顺序尝试，尝试的顺序如下
sequence = ["sglang-qwen3.5-35b-a3b", "aliyun"]

# 这是一个虚节点
[node."qwen3.5-122b-a10b"]
# 虚节点路由策略是顺序尝试，尝试的顺序如下
sequence = ["sglang-qwen3.5-122b-a10b", "aliyun"]

# 这是一些简单后端节点，它们只指定了 base-url，直接转发所有协议，不进行协议转换
[backend]
"sglang-qwen3.5-35b-a3b" = "http://172.17.250.163:30001"
"sglang-qwen3.5-122b-a10b" = "http://172.17.250.163:30002"

# 这是一个后端节点
[backend.aliyun]
# 它指定了特定协议的 base-url，非此协议的负载需要进行协议转换
base-url = { anthropic = "https://dashscope.aliyuncs.com/apps/anthropic" }
# 通过这个节点访问后端时会替换负载中的 api-key
api-key = "$ALIYUN_API_KEY"

# ============================================
# 健康监控配置
# ============================================
[health]
# 滑动窗口大小（秒），默认 60 秒
window-size = 60
# 窗口内失败次数阈值，默认 3 次
failure-threshold = 3
# 冷却时间（秒），默认 300 秒（5 分钟）
cooldown-duration = 300

# ============================================
# 统计配置
# ============================================
[statistics]
# 是否启用统计（默认 true）
enabled = true
# 数据库文件路径（默认 "stats.db"）
db-path = "stats.db"
# 数据保留天数（默认 30）
retention-days = 7

# 聚合配置
[statistics.aggregation]
# 窗口大小列表（秒）：5 分钟，15 分钟，1 小时，1 天
window-sizes = [300, 900, 3600, 86400]
# 默认聚合粒度（秒）
default-window = 3600
# 是否自动预计算
auto-aggregate = true
